services:
  - type: web
    name: zonely-civic-intelligence
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m playwright install chromium"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
