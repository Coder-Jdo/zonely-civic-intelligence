<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Zonely{% endblock %} — Civic Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Manrope', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeeff 0%, #eef4ff 40%, #f0e9ff 100%);
      min-height: 100vh;
    }

    /* Glass card */
    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(99,130,255,0.08);
    }

    .card-solid {
      background: white;
      border: 1px solid rgba(200,215,255,0.5);
      border-radius: 1.25rem;
      box-shadow: 0 2px 16px rgba(99,130,255,0.07);
    }

    /* Score circle colors */
    .score-high   { color: #22c55e; }
    .score-mid    { color: #f59e0b; }
    .score-low    { color: #ef4444; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up   { animation: fadeUp 0.5s ease-out both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.12s; }
    .fade-up-3 { animation-delay: 0.20s; }
    .fade-up-4 { animation-delay: 0.28s; }
    .fade-up-5 { animation-delay: 0.36s; }

    @keyframes barFill { from { width: 0; } }
    .bar-fill { animation: barFill 0.9s cubic-bezier(.16,1,.3,1) both; }

    @keyframes ringFill {
      from { stroke-dasharray: 0 999; }
    }
    .ring-fill { animation: ringFill 1.2s cubic-bezier(.16,1,.3,1) both; }
    
    /* Pro badge */
    .pro-badge {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 999px;
    }

    /* Nav blur */
    .nav-blur {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(200,215,255,0.4);
    }

    /* Pill tag */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(200,215,255,0.6);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
    }

    /* Stat card hover */
    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,130,255,0.13);
    }

    /* Input */
    .search-input {
      background: rgba(255,255,255,0.9);
      border: 1.5px solid rgba(200,215,255,0.7);
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .search-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .search-btn {
      background: linear-gradient(135deg, #4f8ef7, #6366f1);
      color: white;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.92; transform: scale(1.02); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#4f8ef7',
            'brand-dark': '#1e3a5f',
            'brand-purple': '#6366f1',
          }
        }
      }
    }
  </script>
</head>
<body>

  <!-- Nav -->
  <nav class="sticky top-0 z-50 nav-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-3">
      <a href="/" class="flex items-center gap-2">
        <img src="/static/logo.png" alt="Zonely" class="h-14 w-auto" />
      </a>
      <div class="flex items-center gap-6">
        <a href="/"             class="text-xs font-medium text-slate-500 hover:text-brand transition">Home</a>
        <a href="/compare"      class="text-xs font-medium text-slate-500 hover:text-brand transition">Compare</a>
        <a href="/vision"       class="text-xs font-medium text-slate-500 hover:text-brand transition">Vision</a>
        <a href="/documentation"class="text-xs font-medium text-slate-500 hover:text-brand transition">Documentation</a>
        <a href="/contact"      class="text-xs font-medium text-slate-500 hover:text-brand transition">Contact</a>
        <a href="/admin"        class="rounded-full border border-[rgba(99,102,241,0.3)] px-4 py-1.5 text-xs font-semibold text-brand-purple hover:bg-indigo-50 transition">
          Admin
        </a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="mx-auto max-w-6xl px-6 py-10 space-y-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="mt-16 border-t border-white/50 bg-white/30 backdrop-blur py-8">
    <div class="mx-auto max-w-6xl px-6 flex flex-col gap-2 sm:flex-row sm:justify-between items-center">
      <div class="flex items-center gap-6">
        <a href="/" class="text-xs text-slate-400 hover:text-brand transition">Home</a>
        <a href="/compare" class="text-xs text-slate-400 hover:text-brand transition">Compare</a>
        <a href="/documentation" class="text-xs text-slate-400 hover:text-brand transition">Documentation</a>
        <a href="/contact" class="text-xs text-slate-400 hover:text-brand transition">Contact</a>
        <a href="/admin" class="text-xs text-slate-400 hover:text-brand transition">Admin</a>
      </div>
      <p class="text-xs text-slate-400">Not financial advice. Use alongside professional review.</p>
    </div>
  </footer>

</body>
</html>
