<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Zonely{% endblock %} — Civic Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #0F3D57;
      --brand-light: #EAF6FF;
      --brand-mid: #1e5f82;
      --text-secondary: #64748b;
      --stripe: repeating-linear-gradient(135deg, rgba(15,61,87,0.07) 0 2px, transparent 2px 12px);
    }
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'DM Serif Display', serif; }
    .font-mono { font-family: 'DM Mono', monospace; }
    .stripe-bg { background-image: var(--stripe); }

    /* Score ring animation */
    @keyframes dash { to { stroke-dashoffset: 0; } }
    .score-ring { animation: dash 1.2s ease-out forwards; }

    /* Fade-up on load */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.15s; }
    .fade-up-3 { animation-delay: 0.25s; }
    .fade-up-4 { animation-delay: 0.35s; }
    .fade-up-5 { animation-delay: 0.45s; }

    /* Bar fill animation */
    @keyframes barFill { from { width: 0; } }
    .bar-fill { animation: barFill 0.9s cubic-bezier(.16,1,.3,1) both; }

    .card {
      border-radius: 1rem;
      border: 1px solid rgba(15,61,87,0.12);
      background: white;
      box-shadow: 0 8px 24px rgba(15,61,87,0.07);
    }

    /* Tag colours */
    .tag-planning       { background:#dbeafe; color:#1d4ed8; }
    .tag-infrastructure { background:#d1fae5; color:#065f46; }
    .tag-crisis         { background:#fee2e2; color:#991b1b; }
    .tag-market         { background:#fef3c7; color:#92400e; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#0F3D57',
            'brand-light': '#EAF6FF',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-[#F7FBFF]">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 border-b border-[rgba(15,61,87,0.1)] bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center gap-2">
        <img src="/static/logo.png" alt="Zonely" class="h-12 w-auto" />
        <!-- <span class="hidden text-xs text-slate-400 sm:inline">/ Civic Intelligence</span> -->
      </a>
      <div class="flex items-center gap-6">
        <a href="/" class="text-xs font-medium text-slate-500 hover:text-[#0F3D57] transition">Home</a>
        <a href="/compare" class="text-xs font-medium text-slate-500 hover:text-[#0F3D57] transition">Compare</a>
        <a href="/documentation" class="text-xs font-medium text-slate-500 hover:text-[#0F3D57] transition">Documentation</a>
        <a href="/vision" class="text-xs font-medium text-slate-500 hover:text-[#0F3D57] transition">Vision</a>
        <a href="/contact" class="text-xs font-medium text-slate-500 hover:text-[#0F3D57] transition">Contact</a>
        <a href="/admin" class="rounded-md border border-[rgba(15,61,87,0.2)] px-3 py-1.5 text-xs font-semibold text-[#0F3D57] hover:bg-[#EAF6FF] transition">Admin</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="mx-auto max-w-6xl px-6 py-10 space-y-12">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="mt-16 border-t border-[rgba(15,61,87,0.08)] bg-white py-8">
    <div class="mx-auto max-w-6xl px-6 flex flex-col gap-2 sm:flex-row sm:justify-between">
      <p class="text-xs text-slate-400">© 2025 Zonely · Civic Property Services · Leeds pilot</p>
      <p class="text-xs text-slate-400">Not financial advice. Use alongside professional review.</p>
    </div>
  </footer>

</body>
</html>
